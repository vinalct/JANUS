name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:            

jobs:
  fast:
    name: Fast gate (lint + unit)
    runs-on: ubuntu-latest       
    timeout-minutes: 10          
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.12"  
          cache: pip                   
      - name: Install lint/test tooling (no JVM, no PySpark)
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            ruff==0.11.6 \
            pytest==9.0.2 \
            PyYAML==6.0.3 \
            certifi==2026.2.25
      - name: Lint
        run: ruff check src tests          
      - name: Unit tests (Spark tests self-skip)
        run: pytest tests/unit -ra          

  spark:
    name: Spark gate (full suite in container)
    runs-on: ubuntu-latest          
    timeout-minutes: 30             
    steps:
      - uses: actions/checkout@v4
      - name: Build JANUS image           
        run: docker compose -f docker/docker-compose.yml build janus
      - name: Full test suite incl. integration (inside container)
        run: |
          set -o pipefail                 # without this, tee masks pytest's exit code (FR-4)
          JANUS_CONTAINER_USER="$(id -u):$(id -g)" \
          docker compose -f docker/docker-compose.yml run --rm -T janus \
            python -m pytest -ra tests \
            | tee data/pytest-output.txt
          # -T disables the pseudo-TTY: matches the Makefile's `exec -T`, avoids the
          # non-interactive "input device is not a TTY" failure, and keeps control
          # codes out of pytest-output.txt for the task-04 skip-grep / task-07 coverage.
      - name: Prove PySpark is importable in the image
        run: |
          docker compose -f docker/docker-compose.yml run --rm -T janus \
            python -c "import pyspark.sql; print('pyspark', pyspark.__version__)"
      - name: Assert zero PySpark skips
        run: |
          if grep -Eiq "could not import .?pyspark(\.sql)?.?" data/pytest-output.txt; then
            echo "::error::AC-3 violated — Spark tests were SKIPPED for missing PySpark in the container job."
            echo "Offending skip lines:"
            grep -Ein "could not import .?pyspark" data/pytest-output.txt || true
            exit 1
          fi
          echo "OK: no PySpark import skips detected."